name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Show Rust toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run fixture report smoke test
        run: cargo run -p testament-cli -- --config fixtures/evidence/testament.toml report --format json fixtures/ruby/sample_spec.rb

  rustsec:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # Required to check out Cargo.lock.
      checks: write # Required to publish the audit check result.

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ github.token }}

  ruby-probe:
    name: Ruby probe on ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - head

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Verify release version consistency
        if: matrix.ruby == '3.4'
        run: scripts/check-release-version

      - name: Check Ruby probe syntax
        run: ruby -c probes/ruby/testament-probe-ruby/lib/testament/probe.rb

      - name: Run Ruby probe smoke test
        run: |
          TESTAMENT_PROBE_OUTPUT=/tmp/testament-probe-coverage.json \
          TESTAMENT_TRACE_OUTPUT=/tmp/testament-probe-trace.json \
          ruby -Iprobes/ruby/testament-probe-ruby/lib -rtestament/probe -e 'def subject_line; 1; end; def assert(value); raise "failed" unless value; end; Testament::Probe.record("manual case") { assert(subject_line == 1) }'
          test -s /tmp/testament-probe-coverage.json
          test -s /tmp/testament-probe-trace.json
